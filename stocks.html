<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stocks Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    background: #1A1A1A;
    color: #E6E6E6;
    font-family: Roboto, sans-serif;
  }
  .container {
    width: 95%;
    margin: auto;
    padding: 10px 0;
  }
  .row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .tile {
    background: #222;
    border-radius: 12px;
    padding: 8px;
    margin-bottom: 12px;
    box-shadow: 0 0 10px rgba(0,0,0,0.4);
    flex: 1 1 45%;
    min-width: 260px;
  }
  h2 {
    margin: 0 0 6px;
    color: #4DB6F7;
    font-size: 20px;
  }
  iframe {
    border: none;
    width: 100%;
    height: 200px;
  }
</style>

<script>
  setTimeout(() => location.reload(), 5 * 60 * 1000);
</script>

</head>
<body>
<div class="container">

  <h2>Markets</h2>
  <div class="row">

    <div class="tile">
      <iframe src="https://s.tradingview.com/widgetembed/?symbol=TSX%3ATSX&interval=60&theme=dark&style=1"></iframe>
    </div>

    <div class="tile">
      <iframe src="https://s.tradingview.com/widgetembed/?symbol=SP%3ASPX&interval=60&theme=dark&style=1"></iframe>
    </div>

    <div class="tile">
      <iframe src="https://s.tradingview.com/widgetembed/?symbol=NASDAQ%3AIXIC&interval=60&theme=dark&style=1"></iframe>
    </div>

    <div class="tile">
      <iframe src="https://s.tradingview.com/widgetembed/?symbol=TVC%3AUSOIL&interval=60&theme=dark&style=1"></iframe>
    </div>

    <div class="tile">
      <iframe src="https://s.tradingview.com/widgetembed/?symbol=TVC%3AGOLD&interval=60&theme=dark&style=1"></iframe>
    </div>

  </div>
</div>
</body>
</html>
