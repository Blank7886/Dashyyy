<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stocks Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    background: #1A1A1A;
    color: #E6E6E6;
    font-family: Roboto, sans-serif;
  }
  .container {
    width: 95%;
    margin: auto;
    padding: 20px 0;
  }
  .tile {
    background: #222;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 15px;
    box-shadow: 0 0 10px rgba(0,0,0,0.4);
  }
  h2 {
    margin: 0 0 10px;
    color: #4DB6F7;
    font-size: 22px;
  }
  .symbol {
    font-size: 20px;
    font-weight: bold;
  }
  .price {
    font-size: 26px;
    margin-top: 5px;
  }
  .change {
    font-size: 18px;
    margin-top: 5px;
  }
  .green { color: #4CAF50; }
  .red { color: #F44336; }
</style>

<script>
const API_KEY = "ZEKvkkMEOco37uriVLThOiwmFlt1I43E";

const symbols = {
  "TSX": "^GSPTSE",
  "S&P 500": "^GSPC",
  "NASDAQ": "^IXIC",
  "Crude Oil": "CL=F",
  "Gold": "GC=F"
};

async function loadData() {
  for (const [name, symbol] of Object.entries(symbols)) {
    const url = `https://financialmodelingprep.com/api/v3/quote/${encodeURIComponent(symbol)}?apikey=${API_KEY}`;
    try {
      const res = await fetch(url);
      const data = await res.json();
      const item = data[0];

      const price = item.price.toFixed(2);
      const change = item.change.toFixed(2);
      const changePct = item.changesPercentage.toFixed(2);

      const color = change >= 0 ? "green" : "red";

      document.getElementById(name).innerHTML = `
        <div class="symbol">${name}</div>
        <div class="price">$${price}</div>
        <div class="change ${color}">${change} (${changePct}%)</div>
      `;
    } catch (e) {
      document.getElementById(name).innerHTML = "<div>Error loading data</div>";
    }
  }
}

setInterval(loadData, 5 * 60 * 1000);
window.onload = loadData;
</script>

</head>
<body>
<div class="container">

  <h2>Markets</h2>

  <div class="tile" id="TSX"></div>
  <div class="tile" id="S&P 500"></div>
  <div class="tile" id="NASDAQ"></div>
  <div class="tile" id="Crude Oil"></div>
  <div class="tile" id="Gold"></div>

</div>
</body>
</html>
