<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weather Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    background: #1A1A1A;
    color: #E6E6E6;
    font-family: Roboto, sans-serif;
  }
  .container {
    width: 95%;
    margin: auto;
    padding: 20px 0;
  }
  .tile {
    background: #222;
    border-radius: 12px;
    padding: 10px;
    margin-bottom: 20px;
    box-shadow: 0 0 10px rgba(0,0,0,0.4);
  }
  h2 {
    margin: 0 0 10px;
    color: #4DB6F7;
    font-size: 22px;
  }
  iframe {
    border: none;
    width: 100%;
  }
</style>

<script>
  setTimeout(() => location.reload(), 5 * 60 * 1000);
</script>

</head>
<body>
<div class="container">

  <h2>Hourly Forecast</h2>
  <div class="tile">
    <iframe height="420"
      src="https://www.meteoblue.com/en/weather/widget/hourly/mississauga_canada_6075357?geoloc=fixed&nocurrent=1&days=2&tempunit=CELSIUS&windunit=KILOMETER_PER_HOUR&layout=dark">
    </iframe>
  </div>

  <h2>7‑Day Forecast</h2>
  <div class="tile">
    <iframe height="420"
      src="https://www.meteoblue.com/en/weather/widget/daily/mississauga_canada_6075357?geoloc=fixed&days=7&tempunit=CELSIUS&windunit=KILOMETER_PER_HOUR&layout=dark">
    </iframe>
  </div>

</div>
</body>
</html>
