<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weather Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    background: #1A1A1A;
    color: #E6E6E6;
    font-family: Roboto, sans-serif;
  }
  .container {
    width: 95%;
    margin: auto;
    padding: 10px 0;
  }
  .tile {
    background: #222;
    border-radius: 12px;
    padding: 8px;
    margin-bottom: 12px;
    box-shadow: 0 0 10px rgba(0,0,0,0.4);
  }
  h2 {
    margin: 0 0 6px;
    color: #4DB6F7;
    font-size: 20px;
  }
  iframe {
    border: none;
    width: 100%;
  }
</style>

<script>
  setTimeout(() => location.reload(), 5 * 60 * 1000);
</script>

</head>
<body>
<div class="container">

  <h2>Hourly Forecast</h2>
  <div class="tile">
    <iframe height="200"
      src="https://embed.windy.com/embed2.html?lat=43.6&lon=-79.6&zoom=8&level=surface&overlay=rain&metricWind=km/h&metricTemp=%C2%B0C">
    </iframe>
  </div>

  <h2>7‑Day Overview</h2>
  <div class="tile">
    <iframe height="200"
      src="https://www.accuweather.com/en/ca/mississauga/l5a/daily-weather-forecast/55488">
    </iframe>
  </div>

</div>
</body>
</html>
